name: CI - Frontend

on:
  push:
    paths:
      - "frontend/**"
    branches:
      - main
  pull_request:
    paths:
      - "frontend/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Log in to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-frontend:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-frontend:latest ./frontend
          if [ "${{ github.event_name }}" = "push" ]; then
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-frontend:${{ github.sha }}
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-frontend:latest
          fi
