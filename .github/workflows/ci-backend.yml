name: CI - Backend

on:
  push:
    paths:
      - "backend/**"
    branches:
      - main
  pull_request:
    paths:
      - "backend/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Log in to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-backend:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-backend:latest ./backend
          if [ "${{ github.event_name }}" = "push" ]; then
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-backend:${{ github.sha }}
            docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio-backend:latest
          fi
